<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="chat.css">
    <title>ConvoStream • Socket.IO Chat</title>
  </head>
  <body>
    <!-- Welcome/Login Modal Overlay -->
    <div id="loginModal" class="modal-overlay">
      <div class="login-card">
        <h2>ConvoStream</h2>
        <p>Enter your nickname to join the real-time chat workspace</p>
        <form id="loginForm">
          <div class="input-group">
            <label for="nicknameInput">Nickname / Handle</label>
            <input type="text" id="nicknameInput" placeholder="e.g. Alex" required autocomplete="off" />
          </div>
          <button type="submit" class="login-btn">Join Workspace</button>
        </form>
      </div>
    </div>

    <!-- Main Application Viewport -->
    <div class="container" id="mainContainer">

      <!-- Left Sidebar Panel -->
      <div class="sidebar">
        <div class="sidebar-header">
          <div class="app-brand">
            <div class="app-logo">C</div>
            <div class="app-name">ConvoStream</div>
          </div>
          <div class="current-user-profile">
            <div class="user-avatar avatar-current" id="currentUserAvatar">U</div>
            <div class="user-info">
              <div class="user-name" id="currentUserName">Username</div>
              <div class="user-status">
                <span class="status-dot pulse"></span>
                Active
              </div>
            </div>
          </div>
        </div>

        <div class="sidebar-scrollable">
          <!-- Channels Section -->
          <div class="sidebar-section">
            <div class="sidebar-section-title">Channels</div>
            <div class="channel-list">
              <div class="channel-item active" id="publicChatBtn">
                <span class="channel-icon">#</span>
                <span>public-chat</span>
                <span id="publicUnreadBadge" class="unread-badge"></span>
              </div>
            </div>
          </div>

          <!-- Direct Messages / Online Users -->
          <div class="sidebar-section">
            <div class="sidebar-section-title" id="onlineCountTitle">Online (0)</div>
            <div class="user-list" id="onlineUsers">
              <!-- Populated dynamically via JS -->
            </div>
          </div>
        </div>

        <!-- Sidebar Actions Footer -->
        <div class="sidebar-footer">
          <button id="toggle-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="9" x2="15" y2="15"></line>
              <line x1="15" y1="9" x2="9" y2="15"></line>
            </svg>
            <span>Disconnect</span>
          </button>
        </div>
      </div>

      <!-- Right Chat Panel -->
      <div class="chat">
        
        <!-- Header -->
        <div class="chat-header">
          <div class="chat-header-info">
            <div class="chat-title" id="chatHeader">
              <span class="channel-icon">#</span>
              public-chat
            </div>
            <div class="chat-status" id="chatSubHeader">Public channel for general discussion</div>
          </div>
        </div>
        
        <!-- Messages Board -->
        <div id="messages"></div>
        
        <!-- Typing Status Area -->
        <div id="typing"></div>
        
        <!-- Input Form Footer -->
        <form id="form">
          <div class="input-container">
            <input id="input" placeholder="Type a message..." autocomplete="off" />
          </div>
          <button class="send-btn" type="submit">
            <span>Send</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </form>

      </div>

    </div>

    <!-- Scripting -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
      let username = "";
      let counter = 0;
      let socket;
      let selectedUserId = null;
      let selectedUserName = null;
      let privateChats ={};
      const publicMessages = [];
      let unreadCounts = {};
      let lastMessages = {};
      let myUserId = null;
      let publicUnreadCount = 0;
      let isPublicChatSelected = true;

      // DOM Elements
      const loginModal = document.getElementById('loginModal');
      const loginForm = document.getElementById('loginForm');
      const nicknameInput = document.getElementById('nicknameInput');
      const mainContainer = document.getElementById('mainContainer');
      const currentUserName = document.getElementById('currentUserName');
      const currentUserAvatar = document.getElementById('currentUserAvatar');
      
      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const messages = document.getElementById('messages');
      const publicChatBtn = document.getElementById('publicChatBtn');
      const chatHeader = document.getElementById('chatHeader');
      const chatSubHeader = document.getElementById('chatSubHeader');
      const typingDiv = document.getElementById('typing');
      const onlineUsersDiv = document.getElementById('onlineUsers');
      const onlineCountTitle = document.getElementById('onlineCountTitle');
      const toggleButton = document.getElementById('toggle-btn');
      const publicUnreadBadge = document.getElementById("publicUnreadBadge");

      // Colors generator for user avatars
      function getAvatarColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
          hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }
        const colors = [
          'linear-gradient(135deg, #3b82f6, #1d4ed8)', // Blue
          'linear-gradient(135deg, #10b981, #047857)', // Green
          'linear-gradient(135deg, #ef4444, #b91c1c)', // Red
          'linear-gradient(135deg, #f59e0b, #b45309)', // Amber
          'linear-gradient(135deg, #ec4899, #be185d)', // Pink
          'linear-gradient(135deg, #8b5cf6, #5b21b6)', // Purple
          'linear-gradient(135deg, #06b6d4, #0891b2)', // Cyan
          'linear-gradient(135deg, #f97316, #c2410c)', // Orange
        ];
        return colors[Math.abs(hash) % colors.length];
      }

      // Render custom messages to message feed
      function appendMessage({ sender, text, time, isSelf, isPrivate, recipient }) {
        const row = document.createElement('div');
        row.className = `message-row ${isSelf ? 'self' : 'peer'}`;

        const wrapper = document.createElement('div');
        wrapper.className = 'message-wrapper';

        // Avatar
        const avatar = document.createElement('div');
        avatar.className = `message-avatar ${isSelf ? 'self' : ''}`;
        avatar.style.background = getAvatarColor(sender);
        avatar.textContent = sender.substring(0, 2).toUpperCase();

        // Body container
        const bodyContainer = document.createElement('div');
        bodyContainer.className = 'message-body-container';

        // Info line
        const info = document.createElement('div');
        info.className = 'message-info';
        
        const senderSpan = document.createElement('span');
        senderSpan.className = 'message-sender';
        senderSpan.textContent = isSelf ? 'You' : sender;
        
        const timeSpan = document.createElement('span');
        timeSpan.className = 'message-time';
        timeSpan.textContent = time;

        info.appendChild(senderSpan);
        info.appendChild(timeSpan);
        bodyContainer.appendChild(info);

        // DM Tag if private
        if (isPrivate) {
          const dmTag = document.createElement('div');
          dmTag.className = 'dm-tag';
          dmTag.innerHTML = `
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:2px; vertical-align:middle;">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            ${isSelf ? `DM to ${recipient}` : 'DM to You'}
          `;
          bodyContainer.appendChild(dmTag);
        }

        // Bubble
        const bubble = document.createElement('div');
        bubble.className = `message-bubble ${isPrivate ? 'dm-highlight' : ''}`;
        bubble.textContent = text;

        bodyContainer.appendChild(bubble);
        wrapper.appendChild(avatar);
        wrapper.appendChild(bodyContainer);
        row.appendChild(wrapper);
        messages.appendChild(row);

        // Auto-scroll to bottom of messages container
        messages.scrollTop = messages.scrollHeight;
      }

      // Render system alerts (e.g. joins, leaves)
      function appendSystemMessage(text) {
        const container = document.createElement('div');
        container.className = 'system-msg-container';
        
        const pill = document.createElement('div');
        pill.className = 'system-msg-pill';
        pill.textContent = text;
        
        container.appendChild(pill);
        messages.appendChild(container);
        
        messages.scrollTop = messages.scrollHeight;
      }
       let currentUsers =[];
        function renderOnlineUsers() {

            const peerUsers =
               currentUsers.filter(
    user => user.id !== myUserId
);

            onlineCountTitle.textContent =
                `Online (${currentUsers.length})`;

            onlineUsersDiv.innerHTML = peerUsers.map(user => {

                const isSelected =
                    selectedUserId === user.id;

                const initial =
                    user.username.substring(0,2).toUpperCase();

                const avatarBg =
                    getAvatarColor(user.username);

                return `
                    <div class="user-item ${isSelected ? 'active' : ''}"
                        data-user-id="${user.id}"
                        onclick="selectUser('${user.id}','${user.username}')">

                        <div class="user-item-avatar"
                            style="background:${avatarBg}">
                            ${initial}
                        </div>

                       <div class="user-info">
                          <div class="user-name">${user.username}</div>
                          <div class="last-message">
                              ${lastMessages[user.id] || 'No messages yet'}
                          </div>
                       </div>

                        ${
                            unreadCounts[user.id]
                            ? `<span class="unread-badge">
                                  ${unreadCounts[user.id]}
                              </span>`
                            : ''
                        }

                        <span class="user-status-indicator"></span>

                    </div>
                `;
            }).join('');
        }

      // UI Selection for Users
      function selectUser(id, userNameVal) {
        
          if (id === myUserId) return;

          selectedUserId = id;
          selectedUserName = userNameVal;
          isPublicChatSelected = false;
          delete unreadCounts[id];
          renderOnlineUsers();
          messages.innerHTML = '';
          socket.emit(
            'load private chat',
            { userId:selectedUserId ,
              userName: selectedUserName
            },
            (rows)=>{

                messages.innerHTML='';

                rows.forEach(row=>{

                    appendMessage({
                        sender: row.sender,
                        text: row.content,
                        time: row.timestamp,
                        isSelf: row.senderId === myUserId,
                        isPrivate: true,
                        recipient: row.receiver
                    });

                });
                if(rows.length > 0){
                    const lastRow = rows[rows.length - 1];

                    lastMessages[selectedUserId] = lastRow.content;
                    renderOnlineUsers();
                }

            }
        );
        (privateChats[id] || []).forEach(msg => {
          appendMessage(msg);
        })
        // Update header content
        chatHeader.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 4px; vertical-align: middle;">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <span>${userNameVal}</span>
        `;
        chatSubHeader.textContent = `Private conversation with ${userNameVal}`;
        
        // Highlight active user item and deselect channel
        publicChatBtn.classList.remove('active');
        document.querySelectorAll('.user-item').forEach(item => {
          if (item.getAttribute('data-user-id') === id) {
            item.classList.add('active');
          } else {
            item.classList.remove('active');
          }
        });
        
        console.log("Chatting with :", userNameVal);
      }

      // Public Channel click handler
      publicChatBtn.addEventListener('click', () => {
        selectedUserId = null;
        selectedUserName = null;
        publicUnreadCount = 0;
        publicUnreadBadge.textContent = '';
        publicUnreadBadge.style.display = 'none';
        isPublicChatSelected = true;

        chatHeader.innerHTML = `<span class="channel-icon">#</span> public-chat`;
        chatSubHeader.textContent = `Public channel for general discussion`;
        
        publicChatBtn.classList.add('active');
        document.querySelectorAll('.user-item').forEach(item => item.classList.remove('active'));
        messages.innerHTML = '';
        publicMessages.forEach(msg =>{
          appendMessage(msg);
        })
      });

      // Join screen submission
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        username = nicknameInput.value.trim();
        if (username) {
          loginModal.classList.add('hidden');
          mainContainer.classList.add('visible');
          
          currentUserName.textContent = username;
          currentUserAvatar.textContent = username.substring(0, 2).toUpperCase();
          currentUserAvatar.style.background = getAvatarColor(username);
          
          initChat();
        }
      });

      // Initialize connection and Socket.IO bindings
      function initChat() {
        socket = io({
          auth: {
            username,
            serverOffset: 0
          }
        });

        // Typing indicator tracking
        let typing = false;
        input.addEventListener('input', () => {
          if (!typing) {
            typing = true;
            socket.emit('typing');
          }
          clearTimeout(window.typingTimer);
          window.typingTimer = setTimeout(() => {
            typing = false;
            socket.emit('stop typing');
          }, 3000);
        });

        // Form submission for sending messages
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          if (input.value.trim()) {
            const msgVal = input.value;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            if (selectedUserId) {
              // Direct Message (Private)
              socket.emit('private message', {
                to: selectedUserId,
                message: msgVal
              });

              if (!privateChats[selectedUserId]) {
                  privateChats[selectedUserId] = [];
              }

              privateChats[selectedUserId].push({
                  sender: username,
                  text: msgVal,
                  time: time,
                  isSelf: true,
                  isPrivate: true,
                  recipient: selectedUserName
              });
              // lastMessages[selectedUserId] = msgVal;
              // renderOnlineUsers();
              
              appendMessage({
                sender: username,
                text: msgVal,
                time: time,
                isSelf: true,
                isPrivate: true,
                recipient: selectedUserName
              });
              
              input.value = '';
            } else {
              // Public Message
              socket.emit('stop typing');
              typingDiv.innerHTML = '';
              clearTimeout(window.typingTimer);
              
              appendMessage({
                sender: username,
                text: msgVal,
                time: time,
                isSelf: true,
                isPrivate: false
              });
              
              const clientOffset = `${socket.id}-${counter++}`;
              socket.emit('chat message', msgVal, clientOffset, () => {
                console.log("ACK", Date.now());
              });
              input.value = '';
            }
          }
        });

        // Socket Receivers
        socket.on('chat message', (data) => {
          typingDiv.innerHTML = '';
          
          const msg = {
            sender: data.username,
            text: data.message,
            time: data.timestamp,
            isSelf: data.username === username,
            isPrivate: false
          };
          publicMessages.push(msg);
          if(!selectedUserId){
            appendMessage(msg);
          }
          if(!isPublicChatSelected){
              publicUnreadCount++;

              publicUnreadBadge.textContent = publicUnreadCount;
              publicUnreadBadge.style.display = "inline-block";
          }
          socket.auth.serverOffset = data.id;
        });

        socket.on('system message', (msg) => {
          appendSystemMessage(msg);
        });

        socket.on('typing', (user) => {
          typingDiv.innerHTML = `
            <div class="typing-indicator-dots">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
            <span>${user} is typing</span>
          `;
        });

        socket.on('stop typing', (user) => {
          typingDiv.innerHTML = '';
        });
       

        socket.on('private message', (data) => {
          // lastMessages[data.fromId] = data.message;
          // renderOnlineUsers();
          if(data.fromId !== selectedUserId){
            unreadCounts[data.fromId] = (unreadCounts[data.fromId] || 0)+1;
            renderOnlineUsers();
          }
          if(!privateChats[data.fromId]){
            privateChats[data.fromId] =[];
          }
         

          privateChats[data.fromId].push({
            sender: data.from,
            text: data.message,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            isSelf: false,
            isPrivate: true,
            recipient: username
            
          });
          if(selectedUserId === data.fromId){
            appendMessage(privateChats[data.fromId][privateChats[data.fromId].length - 1]);
          }
          
        });

         socket.on('online users', (users) => {
          console.log(users);
          currentUsers = users;
          renderOnlineUsers();
          
        });

      socket.on('user identity',(data)=>{
          myUserId = data.userId;
      });

        // Connection toggle button action
        toggleButton.addEventListener('click', (e) => {
          e.preventDefault();
          if (socket.connected) {
            toggleButton.innerHTML = `
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="9" x2="15" y2="15"></line>
                <line x1="15" y1="9" x2="9" y2="15"></line>
              </svg>
              <span>Connect</span>
            `;
            toggleButton.classList.add('connect');
            socket.disconnect();
          } else {
            toggleButton.innerHTML = `
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="9" x2="15" y2="15"></line>
                <line x1="15" y1="9" x2="9" y2="15"></line>
              </svg>
              <span>Disconnect</span>
            `;
            toggleButton.classList.remove('connect');
            socket.connect();
          }
        });
      }
    </script>
  </body>
</html>
